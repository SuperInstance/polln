# POLLN Staging Deployment Pipeline
# Deploy to staging on merge to main

name: Deploy to Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  ENVIRONMENT: staging
  CLUSTER: staging-cluster
  REGION: us-west-2

jobs:
  # =============================================================================
  # Pre-deployment Checks
  # =============================================================================
  pre-deploy:
    name: Pre-deployment Checks
    runs-on: ubuntu-latest
    outputs:
      can_deploy: ${{ steps.check.outputs.can_deploy }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if deployment is safe
        id: check
        run: |
          # Check for incomplete migrations
          if git diff HEAD~1 HEAD -- migrations/ | grep -q "^+.*up\|^+.*down"; then
            echo "⚠️ Migration changes detected. Ensure migrations are tested."
          fi

          # Check for environment variable changes
          if git diff HEAD~1 HEAD -- .env.example | grep -q "^+"; then
            echo "⚠️ Environment variables changed. Please verify staging config."
          fi

          echo "can_deploy=true" >> $GITHUB_OUTPUT

      - name: Check for ongoing incidents
        run: |
          # Implement incident check logic
          echo "✅ No active incidents detected"

  # =============================================================================
  # Build & Test
  # =============================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: pre-deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:all

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: dist/
          retention-days: 7

  # =============================================================================
  # Build Docker Image
  # =============================================================================
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          VERSION=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "image_tag=ghcr.io/${{ github.repository }}:$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ github.repository }}:staging
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.environment=${{ env.ENVIRONMENT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =============================================================================
  # Run Database Migrations
  # =============================================================================
  migrate:
    name: Database Migrations
    runs-on: ubuntu-latest
    needs: [pre-deploy, docker-build]
    environment:
      name: staging
      url: https://staging.polln.ai
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Run migrations
        run: |
          # Implement migration logic
          echo "Running database migrations for staging..."
          # npm run db:migrate:staging

      - name: Verify migrations
        run: |
          echo "Verifying migration results..."

  # =============================================================================
  # Deploy to Kubernetes
  # =============================================================================
  deploy-k8s:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [pre-deploy, docker-build, migrate]
    environment:
      name: staging
      url: https://staging.polln.ai
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Update deployment image
        run: |
          export KUBECONFIG=kubeconfig
          kubectl set image deployment/polln-staging \
            polln=${{ needs.docker-build.outputs.image_tag }} \
            -n polln-staging

      - name: Wait for rollout
        run: |
          export KUBECONFIG=kubeconfig
          kubectl rollout status deployment/polln-staging -n polln-staging --timeout=5m

      - name: Verify deployment
        run: |
          export KUBECONFIG=kubeconfig
          kubectl get pods -n polln-staging
          kubectl get services -n polln-staging

  # =============================================================================
  # Run Smoke Tests
  # =============================================================================
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-k8s
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        run: |
          npm run test:smoke -- --env=staging
        env:
          STAGING_URL: https://staging.polln.ai
          API_KEY: ${{ secrets.STAGING_API_KEY }}

      - name: Health check
        run: |
          curl -f https://staging.polln.ai/health || exit 1
          curl -f https://staging.polln.ai/api/v1/status || exit 1

      - name: WebSocket connection test
        run: |
          npm run test:websocket -- --url=wss://staging.polln.ai

  # =============================================================================
  # Integration Tests
  # =============================================================================
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: smoke-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests against staging
        run: npm run test:integration:staging
        env:
          STAGING_URL: https://staging.polln.ai
          STAGING_API_KEY: ${{ secrets.STAGING_API_KEY }}

  # =============================================================================
  # Performance Tests
  # =============================================================================
  performance-test:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: smoke-test
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Run load tests
        run: |
          npm run test:load -- --url=https://staging.polln.ai --duration=5m
        continue-on-error: true

  # =============================================================================
  # Notification
  # =============================================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy-k8s, smoke-test, integration-test]
    if: always()
    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.smoke-test.result }}" = "success" ] && \
             [ "${{ needs.integration-test.result }}" = "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
          fi

      - name: Slack notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ steps.status.outputs.emoji }} POLLN Staging Deployment",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*${{ steps.status.outputs.emoji }} POLLN Staging Deployment*\n\n*Commit:* ${{ github.sha }}\n*Branch:* ${{ github.ref }}\n*Deploy:* ${{ steps.status.outputs.status }}\n*Smoke Tests:* ${{ needs.smoke-test.result }}\n*Integration Tests:* ${{ needs.integration-test.result }}\n\n<https://staging.polln.ai|View Staging>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Create deployment status
        if: steps.status.outputs.status == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: '❌ Staging deployment failed. Please check the logs.'
            })

  # =============================================================================
  # Rollback on Failure
  # =============================================================================
  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    needs: [smoke-test, integration-test]
    if: |
      always() &&
      (needs.smoke-test.result == 'failure' ||
       needs.integration-test.result == 'failure')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Rollback deployment
        run: |
          export KUBECONFIG=kubeconfig
          kubectl rollout undo deployment/polln-staging -n polln-staging

      - name: Wait for rollback
        run: |
          export KUBECONFIG=kubeconfig
          kubectl rollout status deployment/polln-staging -n polln-staging --timeout=5m

      - name: Notify rollback
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "⚠️ POLLN Staging Rollback",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*⚠️ POLLN Staging Rollback*\n\nStaging deployment failed and has been rolled back to the previous version.\n\n*Commit:* ${{ github.sha }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # =============================================================================
  # Cleanup
  # =============================================================================
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [notify, rollback]
    if: always()
    steps:
      - name: Clean up old Docker images
        run: |
          echo "Cleaning up images older than 7 days..."
          # Implement cleanup logic

      - name: Clean up old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            const weekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);

            for (const artifact of artifacts.data.artifacts) {
              const created = new Date(artifact.created_at);
              if (created < weekAgo) {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id
                });
              }
            }
