# POLLN PR Validation Pipeline
# Validates pull requests with coverage checks and size limits

name: Pull Request Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # =============================================================================
  # PR Validation
  # =============================================================================
  validate-pr:
    name: Validate PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            chore
            revert
          scopes: |
            core
            spreadsheet
            api
            cli
            guardian
            colony
            agents
            learning
            evolution
            deployment
            docs
          requireScope: false
          validateSingleCommit: true

      - name: Check PR description
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr.body || pr.body.length < 20) {
              core.setFailed('PR description is too short. Please provide a detailed description.');
            }

      - name: Check for breaking changes
        run: |
          if git diff HEAD~1 HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' | grep -q 'export.*function\|export.*class\|export.*interface\|export.*type'; then
            echo "⚠️ Potential breaking changes detected. Please review exports carefully."
          fi

      - name: Check license header
        run: |
          missing=$(git diff --name-only --diff-filter=d --cached -- '*.ts' '*.tsx' '*.js' | xargs grep -L 'MIT License' || true)
          if [ -n "$missing" ]; then
            echo "⚠️ Files missing license header:"
            echo "$missing"
          fi

  # =============================================================================
  # Coverage Checks
  # =============================================================================
  coverage-check:
    name: Coverage Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Check coverage thresholds
        run: |
          coverage=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          echo "Current coverage: ${coverage}%"

          if (( $(echo "$coverage < 90" | bc -l) )); then
            echo "❌ Coverage is below 90% threshold"
            exit 1
          fi

          echo "✅ Coverage meets 90% threshold"

      - name: Generate coverage diff
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const totalLines = coverage.total.lines.total;
            const coveredLines = coverage.total.lines.covered;
            const percentage = ((coveredLines / totalLines) * 100).toFixed(2);

            const comment = `## 📊 Coverage Report

            | Metric | Value |
            |--------|-------|
            | Line Coverage | ${percentage}% |
            | Lines Covered | ${coveredLines}/${totalLines} |
            | Branch Coverage | ${coverage.total.branches.pct}% |
            | Functions Covered | ${coverage.total.functions.pct}% |
            | Statements Covered | ${coverage.total.statements.pct}% |

            ${percentage >= 90 ? '✅ Coverage meets 90% threshold' : '❌ Coverage below 90% threshold'}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # =============================================================================
  # Bundle Size Check
  # =============================================================================
  size-check:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Calculate bundle size
        id: size
        run: |
          size=$(du -sh dist/ | cut -f1)
          echo "size=$size" >> $GITHUB_OUTPUT
          echo "📦 Bundle size: $size"

      - name: Comment size on PR
        uses: actions/github-script@v7
        with:
          script: |
            const size = '${{ steps.size.outputs.size }}';
            const comment = `## 📦 Bundle Size

            Current bundle size: **${size}**

            Compare this with the base branch to ensure no significant size increases.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Check size limits
        run: |
          max_size=50M
          actual_size=$(du -sm dist/ | cut -f1)

          if [ "$actual_size" -gt "$max_size" ]; then
            echo "❌ Bundle size exceeds ${max_size}M limit"
            exit 1
          fi

          echo "✅ Bundle size within ${max_size}M limit"

  # =============================================================================
  # Breaking Change Detection
  # =============================================================================
  breaking-check:
    name: Breaking Change Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Export API surface
        run: |
          npm run api:extract > current-api.txt || true

      - name: Compare with base branch
        id: diff
        run: |
          git checkout origin/${{ github.base_ref }}
          npm run build
          npm run api:extract > base-api.txt || true

          git checkout origin/${{ github.head_ref }}

          if diff -q base-api.txt current-api.txt > /dev/null; then
            echo "✅ No breaking changes detected"
            echo "has_breaking=false" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Potential breaking changes detected in API surface"
            echo "has_breaking=true" >> $GITHUB_OUTPUT
            diff base-api.txt current-api.txt || true
          fi

      - name: Comment on breaking changes
        if: steps.diff.outputs.has_breaking == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `## ⚠️ Potential Breaking Changes

            Changes to the public API surface have been detected. Please review:

            - Check if any exported functions, classes, or interfaces have been removed
            - Verify if function signatures have changed
            - Ensure type definitions remain compatible
            - Update version accordingly (major version bump)

            If these are intentional breaking changes, add \`!\` to the commit type (e.g., \`feat!:\`)`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # =============================================================================
  # Dependency Review
  # =============================================================================
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0

  # =============================================================================
  # Code Quality Checks
  # =============================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run complexity analysis
        run: |
          npm run complexity:check || true

      - name: Check code duplication
        run: |
          npx jscpd src/ --format typescript --threshold 5 || true

      - name: Check for TODOs
        run: |
          todos=$(grep -r "TODO\|FIXME\|XXX" src/ --include="*.ts" --include="*.tsx" | wc -l)
          echo "Found $todos TODO/FIXME comments"

          if [ "$todos" -gt 50 ]; then
            echo "⚠️ High number of TODO/FIXME comments. Please address them."
          fi

  # =============================================================================
  # PR Labeler
  # =============================================================================
  label-pr:
    name: Label PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Label PR
        uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true

  # =============================================================================
  # Summary
  # =============================================================================
  summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [validate-pr, coverage-check, size-check, breaking-check, code-quality]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## PR Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validate PR | ${{ needs.validate-pr.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage Check | ${{ needs.coverage-check.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Size Check | ${{ needs.size-check.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Breaking Check | ${{ needs.breaking-check.result == 'success' && '✅ Passed' || '⚠️ Review' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result == 'success' && '✅ Passed' || '⚠️ Review' }} |" >> $GITHUB_STEP_SUMMARY
