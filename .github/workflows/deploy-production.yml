# POLLN Production Deployment Pipeline
# Manual trigger for production deployment with blue-green strategy

name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., v1.2.3)'
        required: true
        type: string
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - production
          - dr-secondary
      skip_smoke_tests:
        description: 'Skip smoke tests (use with caution)'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '20'
  ENVIRONMENT: production
  CLUSTER: production-cluster
  REGION: us-east-1
  DR_REGION: eu-west-1

jobs:
  # =============================================================================
  # Pre-deployment Validation
  # =============================================================================
  validate:
    name: Validate Deployment
    runs-on: ubuntu-latest
    outputs:
      can_deploy: ${{ steps.check.outputs.can_deploy }}
      version: ${{ inputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version exists
        run: |
          if ! git rev-parse ${{ inputs.version }} >/dev/null 2>&1; then
            echo "❌ Version ${{ inputs.version }} does not exist"
            exit 1
          fi

      - name: Check staging deployment
        id: check
        run: |
          echo "Checking if version was deployed to staging..."

          # Implement check against staging
          response=$(curl -s https://staging.polln.ai/api/v1/version)
          staging_version=$(echo $response | jq -r '.version')

          echo "Staging version: $staging_version"
          echo "Target version: ${{ inputs.version }}"

          if [ "$staging_version" != "${{ inputs.version }}" ]; then
            echo "⚠️ Version ${{ inputs.version }} was not deployed to staging"
            echo "Consider deploying to staging first"
          fi

          echo "can_deploy=true" >> $GITHUB_OUTPUT

      - name: Check for active incidents
        run: |
          # Implement incident check
          echo "✅ No active incidents"

      - name: Verify approval
        run: |
          echo "⚠️ Production deployment requires manual approval"

  # =============================================================================
  # Build Production Image
  # =============================================================================
  build:
    name: Build Production Image
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          VERSION=${{ inputs.version }}
          SHORT_SHA=$(git rev-parse --short $VERSION)
          echo "image_tag=ghcr.io/${{ github.repository }}:$VERSION" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Build and push production image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ github.repository }}:production
            ghcr.io/${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.short_sha }}
            org.opencontainers.image.environment=production
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            NODE_ENV=production

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.meta.outputs.image_tag }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # =============================================================================
  # Production Deployment (Blue-Green)
  # =============================================================================
  deploy-blue-green:
    name: Blue-Green Deployment
    runs-on: ubuntu-latest
    needs: [validate, build]
    environment:
      name: production
      url: https://polln.ai
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Get current deployment
        id: current
        run: |
          export KUBECONFIG=kubeconfig
          CURRENT_COLOR=$(kubectl get deployment polln-prod -n polln-prod -o jsonpath='{.spec.selector.matchLabels.color}')
          echo "current_color=$CURRENT_COLOR" >> $GITHUB_OUTPUT

          if [ "$CURRENT_COLOR" = "blue" ]; then
            echo "new_color=green" >> $GITHUB_OUTPUT
          else
            echo "new_color=blue" >> $GITHUB_OUTPUT
          fi

      - name: Deploy new color (green/blue)
        run: |
          export KUBECONFIG=kubeconfig
          NEW_COLOR=${{ steps.current.outputs.new_color }}

          echo "Deploying to $NEW_COLOR environment..."

          kubectl apply -f kubernetes/deployment.yaml -n polln-prod
          kubectl set image deployment/polln-prod-$NEW_COLOR \
            polln=${{ needs.build.outputs.image_tag }} \
            -n polln-prod

      - name: Wait for new deployment rollout
        run: |
          export KUBECONFIG=kubeconfig
          NEW_COLOR=${{ steps.current.outputs.new_color }}

          kubectl rollout status deployment/polln-prod-$NEW_COLOR -n polln-prod --timeout=10m

      - name: Get new service endpoint
        id: endpoint
        run: |
          export KUBECONFIG=kubeconfig
          NEW_COLOR=${{ steps.current.outputs.new_color }}

          # Get the internal endpoint for the new color
          ENDPOINT=$(kubectl get service polln-prod-$NEW_COLOR -n polln-prod -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          echo "endpoint=$ENDPOINT" >> $GITHUB_OUTPUT

  # =============================================================================
  # Pre-traffic Health Checks
  # =============================================================================
  health-check:
    name: Health Checks
    runs-on: ubuntu-latest
    needs: [validate, build, deploy-blue-green]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Run health checks
        id: health
        run: |
          # Wait for service to be ready
          max_attempts=30
          attempt=0

          while [ $attempt -lt $max_attempts ]; do
            if curl -f http://${{ needs.deploy-blue-green.outputs.endpoint }}/health; then
              echo "✅ Health check passed"
              echo "healthy=true" >> $GITHUB_OUTPUT
              exit 0
            fi

            attempt=$((attempt + 1))
            echo "Attempt $attempt/$max_attempts failed. Retrying in 10s..."
            sleep 10
          done

          echo "❌ Health check failed"
          echo "healthy=false" >> $GITHUB_OUTPUT
          exit 1

      - name: Run smoke tests
        if: inputs.skip_smoke_tests != true
        run: |
          npm run test:smoke -- --url=http://${{ needs.deploy-blue-green.outputs.endpoint }}
        env:
          API_KEY: ${{ secrets.PRODUCTION_API_KEY }}

  # =============================================================================
  # Database Migrations
  # =============================================================================
  migrate:
    name: Database Migrations
    runs-on: ubuntu-latest
    needs: [validate, health-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Run database migrations
        run: |
          echo "Running production database migrations..."
          # Implement migration logic with backup
          # npm run db:migrate:production

      - name: Verify migrations
        run: |
          echo "Verifying migration results..."

      - name: Create migration backup
        run: |
          # Create backup before migration
          echo "Creating migration backup..."

  # =============================================================================
  # Switch Traffic
  # =============================================================================
  switch-traffic:
    name: Switch Traffic
    runs-on: ubuntu-latest
    needs: [validate, deploy-blue-green, health-check, migrate]
    environment:
      name: production
      url: https://polln.ai
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Switch traffic to new color
        run: |
          export KUBECONFIG=kubeconfig
          NEW_COLOR=${{ needs.deploy-blue-green.outputs.new_color }}

          echo "Switching traffic to $NEW_COLOR..."

          # Update service selector to point to new deployment
          kubectl patch service polln-prod -n polln-prod -p '{"spec":{"selector":{"color":"'$NEW_COLOR'"}}}'

      - name: Verify traffic switch
        run: |
          export KUBECONFIG=kubeconfig

          # Wait a bit for the change to propagate
          sleep 30

          # Check the service selector
          kubectl get service polln-prod -n polln-prod -o jsonpath='{.spec.selector}'

          echo "✅ Traffic switched successfully"

      - name: Monitor for errors
        run: |
          # Monitor logs for errors after switch
          export KUBECONFIG=kubeconfig
          NEW_COLOR=${{ needs.deploy-blue-green.outputs.new_color }}

          echo "Monitoring logs for 2 minutes..."
          sleep 120

          ERROR_COUNT=$(kubectl logs -l app=polln,color=$NEW_COLOR -n polln-prod --tail=1000 | grep -i "error\|exception" | wc -l)

          if [ "$ERROR_COUNT" -gt 10 ]; then
            echo "⚠️ High error count detected: $ERROR_COUNT"
          else
            echo "✅ Error count within normal range: $ERROR_COUNT"
          fi

  # =============================================================================
  # Post-deployment Validation
  # =============================================================================
  post-deploy-validation:
    name: Post-deployment Validation
    runs-on: ubuntu-latest
    needs: [validate, switch-traffic]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        run: npm run test:smoke -- --env=production
        env:
          PRODUCTION_URL: https://polln.ai
          API_KEY: ${{ secrets.PRODUCTION_API_KEY }}

      - name: Run integration tests
        run: npm run test:integration -- --env=production
        env:
          PRODUCTION_URL: https://polln.ai
          API_KEY: ${{ secrets.PRODUCTION_API_KEY }}

      - name: Monitor metrics
        run: |
          # Check key metrics
          echo "Checking production metrics..."
          # Implement metrics checks (error rate, latency, etc.)

  # =============================================================================
  # Rollback on Failure
  # =============================================================================
  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    needs: [switch-traffic, post-deploy-validation]
    if: |
      always() &&
      needs.post-deploy-validation.result == 'failure'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Rollback to previous color
        run: |
          export KUBECONFIG=kubeconfig
          NEW_COLOR=${{ needs.deploy-blue-green.outputs.new_color }}

          if [ "$NEW_COLOR" = "blue" ]; then
            OLD_COLOR="green"
          else
            OLD_COLOR="blue"
          fi

          echo "Rolling back to $OLD_COLOR..."

          # Switch service selector back
          kubectl patch service polln-prod -n polln-prod -p '{"spec":{"selector":{"color":"'$OLD_COLOR'"}}}'

      - name: Verify rollback
        run: |
          export KUBECONFIG=kubeconfig

          sleep 30

          if curl -f https://polln.ai/health; then
            echo "✅ Rollback successful"
          else
            echo "❌ Rollback failed - manual intervention required"
          fi

      - name: Critical notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚨 POLLN Production Rollback",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*🚨 POLLN Production Rollback*\n\nProduction deployment failed and has been rolled back.\n\n*Version:* ${{ inputs.version }}\n*Time:* $(date)\n\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_CRITICAL }}

  # =============================================================================
  # Scale Down Old Deployment
  # =============================================================================
  cleanup:
    name: Cleanup Old Deployment
    runs-on: ubuntu-latest
    needs: [switch-traffic, post-deploy-validation]
    if: |
      always() &&
      needs.post-deploy-validation.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Wait for stabilization period
        run: |
          echo "Waiting 30 minutes for stabilization..."
          sleep 1800

      - name: Scale down old deployment
        run: |
          export KUBECONFIG=kubeconfig
          NEW_COLOR=${{ needs.deploy-blue-green.outputs.new_color }}

          if [ "$NEW_COLOR" = "blue" ]; then
            OLD_COLOR="green"
          else
            OLD_COLOR="blue"
          fi

          echo "Scaling down $OLD_COLOR deployment..."
          kubectl scale deployment polln-prod-$OLD_COLOR --replicas=0 -n polln-prod

  # =============================================================================
  # Notification
  # =============================================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [validate, switch-traffic, post-deploy-validation, rollback]
    if: always()
    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.post-deploy-validation.result }}" = "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "message=Production deployment successful" >> $GITHUB_OUTPUT
          elif [ "${{ needs.rollback.result }}" = "success" ]; then
            echo "status=rolled_back" >> $GITHUB_OUTPUT
            echo "emoji=⚠️" >> $GITHUB_OUTPUT
            echo "message=Production deployment rolled back" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "message=Production deployment failed" >> $GITHUB_OUTPUT
          fi

      - name: Slack notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ steps.status.outputs.emoji }} POLLN Production Deployment",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*${{ steps.status.outputs.emoji }} POLLN Production Deployment*\n\n*Version:* ${{ inputs.version }}\n*Status:* ${{ steps.status.outputs.message }}\n*Deployed by:* ${{ github.actor }}\n*Time:* $(date)\n\n<https://polln.ai|View Production>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Create GitHub deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const { data: deployment } = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: '${{ inputs.version }}',
              environment: 'production',
              description: '${{ steps.status.outputs.message }}',
              auto_inactive: true,
              required_contexts: []
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.id,
              state: '${{ needs.post-deploy-validation.result }}',
              environment_url: 'https://polln.ai',
              log_url: 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}',
              environment: 'production'
            });

  # =============================================================================
  # DR Replication
  # =============================================================================
  dr-replicate:
    name: DR Replication
    runs-on: ubuntu-latest
    needs: [validate, switch-traffic, post-deploy-validation]
    if: |
      always() &&
      needs.post-deploy-validation.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure DR credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_DR_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_DR_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.DR_REGION }}

      - name: Replicate to DR region
        run: |
          echo "Replicating to DR region..."

      - name: Verify DR replication
        run: |
          echo "Verifying DR replication..."

  # =============================================================================
  # Post-deployment Documentation
  # =============================================================================
  document:
    name: Update Documentation
    runs-on: ubuntu-latest
    needs: [validate, switch-traffic]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update deployment log
        run: |
          cat >> deployment-log.md << EOF
          ## ${{ inputs.version }} - $(date)
          - Deployed by: ${{ github.actor }}
          - Environment: ${{ inputs.environment }}
          - Status: ${{ needs.post-deploy-validation.result }}
          - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF

      - name: Commit deployment log
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add deployment-log.md
          git commit -m "chore: update deployment log for ${{ inputs.version }}"
          git push
