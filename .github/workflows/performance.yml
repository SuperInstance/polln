# POLLN Performance Benchmarks
# Runs performance tests and tracks benchmarks over time

name: Performance

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run daily at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # =============================================================================
  # Benchmark
  # =============================================================================
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run benchmarks
        run: npm run bench:ci
        continue-on-error: true

      - name: Download baseline
        uses: actions/cache@v3
        with:
          path: benchmarks/baseline.json
          key: benchmarks-baseline-${{ github.base_ref }}
          restore-keys: |
            benchmarks-baseline-main
            benchmarks-baseline-

      - name: Compare with baseline
        run: |
          if [ -f benchmarks/baseline.json ]; then
            npm run bench:compare -- --baseline benchmarks/baseline.json
          else
            echo "No baseline found, skipping comparison"
          fi
        continue-on-error: true

      - name: Save baseline
        run: |
          mkdir -p benchmarks
          cp benchmarks/results.json benchmarks/baseline.json
        if: github.ref == 'refs/heads/main'

      - name: Upload benchmark results
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-results
          path: |
            benchmarks/results.json
            benchmarks/baseline.json
          retention-days: 90

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'benchmarkjs'
          output-file-path: benchmarks/results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '200%'
          comment-on-alert: true
          fail-on-alert: false
          alert-comment-cc-users: '@casey'
        continue-on-error: true

  # =============================================================================
  # Load Test
  # =============================================================================
  load-test:
    name: Load Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        scenario: [basic, websocket, concurrent]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Start API server
        run: |
          node dist/api/server.js &
          sleep 10

      - name: Install k6
        run: |
          curl https://github.com/grafana/k6/releases/download/v0.47.0/k6-v0.47.0-linux-amd64.tar.gz -L | tar xvz
          sudo mv k6-v0.47.0-linux-amd64/k6 /usr/local/bin/

      - name: Run load test
        run: |
          k6 run \
            --out json=load-test-${{ matrix.scenario }}.json \
            benchmarks/load-tests/${{ matrix.scenario }}.js
        continue-on-error: true

      - name: Upload load test results
        uses: actions/upload-artifact@v3
        with:
          name: load-test-results-${{ matrix.scenario }}
          path: load-test-${{ matrix.scenario }}.json
          retention-days: 30

  # =============================================================================
  # Memory Profiling
  # =============================================================================
  memory-profile:
    name: Memory Profile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run memory profiling
        run: |
          node --expose-gc \
               --heap-prof \
               dist/api/server.js &
          SERVER_PID=$!

          # Wait for server to start
          sleep 10

          # Run memory test
          npm run test:memory

          # Stop server
          kill $SERVER_PID

          # Generate heap profile
          node --heap-prof-process-profile heap-profile-*.heapprofile

          # Move results
          mkdir -p memory-profile
          mv heap-profile-*.heapprofile memory-profile/
          mv *.heapsnapshot memory-profile/
        continue-on-error: true

      - name: Upload memory profiles
        uses: actions/upload-artifact@v3
        with:
          name: memory-profile
          path: memory-profile/
          retention-days: 30

  # =============================================================================
  # Performance Regression Test
  # =============================================================================
  regression-test:
    name: Performance Regression Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Checkout previous commit
        run: |
          git checkout HEAD~1

      - name: Build previous version
        run: |
          npm ci
          npm run build

      - name: Benchmark previous version
        run: |
          npm run bench:ci -- --output benchmarks/previous.json

      - name: Checkout current commit
        run: |
          git checkout -

      - name: Build current version
        run: |
          npm ci
          npm run build

      - name: Benchmark current version
        run: |
          npm run bench:ci -- --output benchmarks/current.json

      - name: Compare versions
        run: |
          npm run bench:compare \
            --baseline benchmarks/previous.json \
            --current benchmarks/current.json \
            --threshold 10

      - name: Upload comparison
        uses: actions/upload-artifact@v3
        with:
          name: regression-comparison
          path: |
            benchmarks/previous.json
            benchmarks/current.json
            benchmarks/comparison.json
          retention-days: 90

  # =============================================================================
  # Generate Report
  # =============================================================================
  report:
    name: Generate Report
    runs-on: ubuntu-latest
    needs: [benchmark, load-test, memory-profile, regression-test]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3

      - name: Generate performance report
        run: |
          echo "# Performance Report" > performance-report.md
          echo "" >> performance-report.md
          echo "Generated: $(date -u)" >> performance-report.md
          echo "" >> performance-report.md
          echo "## Benchmark Results" >> performance-report.md
          echo '```json' >> performance-report.md
          cat benchmark-results/baseline.json >> performance-report.md 2>/dev/null || echo "No results"
          echo '```' >> performance-report.md

      - name: Upload report
        uses: actions/upload-artifact@v3
        with:
          name: performance-report
          path: performance-report.md
          retention-days: 90

      - name: Add to job summary
        run: |
          cat performance-report.md >> $GITHUB_STEP_SUMMARY
