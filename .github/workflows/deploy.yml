# POLLN CD Pipeline
# Deploys to production on merge to main

name: CD

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  NODE_VERSION: '20'
  REGISTRY: docker.io
  IMAGE_NAME: polln/polln

jobs:
  # =============================================================================
  # Release
  # =============================================================================
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          else
            VERSION="$(git describe --tags --always --dirty)"
            echo "tag=$VERSION" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          release_name: Release ${{ steps.version.outputs.tag }}
          body: |
            ## Release ${{ steps.version.outputs.tag }}

            See [CHANGELOG.md](https://github.com/SuperInstance/polln/blob/main/CHANGELOG.md) for details.
          draft: false
          prerelease: false

  # =============================================================================
  # Build & Push
  # =============================================================================
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [release]
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deployment/docker/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.release.outputs.version }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

  # =============================================================================
  # Deploy to Staging
  # =============================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://polln-staging.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name polln-staging-cluster \
            --region us-east-1

      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/polln-api \
            polln-api=polln/polln:${{ github.sha }} \
            -n polln-staging

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/polln-api \
            -n polln-staging \
            --timeout=5m

      - name: Verify deployment
        run: |
          kubectl get pods -n polln-staging -l app=polln

  # =============================================================================
  # Deploy to Production
  # =============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: production
      url: https://polln.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name polln-prod-cluster \
            --region us-east-1

      - name: Create deployment tag
        run: |
          echo "DEPLOYMENT_TAG=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV

      - name: Annotate deployment
        run: |
          kubectl annotate deployment/polln-api \
            deployment.kubernetes.io/deployment-timestamp=$DEPLOYMENT_TAG \
            -n polln-prod \
            --overwrite

      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/polln-api \
            polln-api=polln/polln:${{ needs.release.outputs.tag }} \
            -n polln-prod

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/polln-api \
            -n polln-prod \
            --timeout=10m

      - name: Verify deployment
        run: |
          kubectl get pods -n polln-prod -l app=polln

      - name: Run smoke tests
        run: |
          kubectl run smoke-test \
            --image=curlimages/curl:latest \
            --rm -i --restart=Never \
            -- curl -f http://polln-api.polln-prod.svc.cluster.local:3000/health

      - name: Rollback on failure
        if: failure()
        run: |
          kubectl rollout undo deployment/polln-api -n polln-prod

  # =============================================================================
  # Notification
  # =============================================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()
    steps:
      - name: Send Slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Deployment ${{ job.status }}: ${{ needs.release.outputs.tag }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: always()
