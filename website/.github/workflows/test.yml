name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'website/package-lock.json'

    - name: Install dependencies
      working-directory: ./website
      run: npm ci

    - name: Run unit tests
      working-directory: ./website
      run: npm run test

    - name: Run test coverage
      working-directory: ./website
      run: npm run test:coverage

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        directory: ./website/coverage
        flags: unit

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'website/package-lock.json'

    - name: Install dependencies
      working-directory: ./website
      run: npm ci

    - name: Install Playwright browsers
      working-directory: ./website
      run: npx playwright install --with-deps chromium

    - name: Build website
      working-directory: ./website
      run: npm run build

    - name: Run E2E tests
      working-directory: ./website
      run: npm run test:e2e
      env:
        PLAYWRIGHT_TEST_BASE_URL: 'http://localhost:4321'

    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: website/playwright-report/
        retention-days: 30

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'website/package-lock.json'

    - name: Install dependencies
      working-directory: ./website
      run: npm ci

    - name: Build website
      working-directory: ./website
      run: npm run build

    - name: Run performance tests
      working-directory: ./website
      run: npm run test:performance

    - name: Upload performance reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: performance-reports
        path: website/performance-reports/
        retention-days: 30

  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'website/package-lock.json'

    - name: Install dependencies
      working-directory: ./website
      run: npm ci

    - name: Run security audit
      working-directory: ./website
      run: npm run test:security:audit

    - name: Run security tests
      working-directory: ./website
      run: npm run test:security

    - name: Upload security reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: website/security-reports/
        retention-days: 30

  accessibility-tests:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'website/package-lock.json'

    - name: Install dependencies
      working-directory: ./website
      run: npm ci

    - name: Build website
      working-directory: ./website
      run: npm run build

    - name: Run accessibility tests
      working-directory: ./website
      run: npm run test:accessibility

    - name: Upload accessibility reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: accessibility-reports
        path: website/accessibility-reports/
        retention-days: 30

  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests, performance-tests, security-tests, accessibility-tests]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'website/package-lock.json'

    - name: Install dependencies
      working-directory: ./website
      run: npm ci

    - name: Run all tests
      working-directory: ./website
      run: npm run test:all

    - name: Quality Gate Check
      run: |
        echo "✅ All quality gates passed"
        echo "Unit Tests: ✅ Passed"
        echo "E2E Tests: ✅ Passed"
        echo "Performance Tests: ✅ Passed"
        echo "Security Tests: ✅ Passed"
        echo "Accessibility Tests: ✅ Passed"

    - name: Create Test Summary
      if: always()
      run: |
        echo "# Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Quality Gates Status" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Test Type | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Unit Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
        echo "| E2E Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
        echo "| Performance Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
        echo "| Security Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
        echo "| Accessibility Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY